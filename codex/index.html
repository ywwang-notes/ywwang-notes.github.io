<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人動態網頁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <main class="page-shell">
    <section class="intro" aria-labelledby="profile-title">
      <div class="intro-copy">
        <p class="eyebrow">Personal Site / Future Ready</p>
        <h1 id="profile-title">你好，我是 <span>你的名字</span></h1>
        <p class="lead">
          我正在打造自己的數位名片。這裡會放我的故事、作品方向，以及讓人快速找到我的方式。
        </p>
        <p class="bio">
          我對科技、創作與解決問題很感興趣。現在正在學習把想法做成可以互動的網頁，
          也期待把每一次小小的實驗，累積成真正有價值的作品。
        </p>

        <div class="status-row" aria-label="目前狀態">
          <div>
            <strong>01</strong>
            <span>持續學習</span>
          </div>
          <div>
            <strong>24/7</strong>
            <span>保持好奇</span>
          </div>
          <div>
            <strong>∞</strong>
            <span>想像力上線</span>
          </div>
        </div>

        <nav class="contact-links" aria-label="聯絡連結">
          <a href="mailto:hello@example.com">Email</a>
          <a href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
          <a href="https://www.linkedin.com/" target="_blank" rel="noreferrer">LinkedIn</a>
        </nav>
      </div>

      <aside class="signal-panel" aria-label="個人形象">
        <div class="image-frame">
          <img
            src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=900&q=80"
            alt="電路板與光點形成的科技感影像"
          >
        </div>
        <div class="scan-card">
          <p>Identity Signal</p>
          <strong id="typing-text">載入個人訊號中</strong>
          <span>Available for ideas, learning, and collaboration.</span>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
